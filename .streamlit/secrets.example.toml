# Copy this file to .streamlit/secrets.toml and fill in real values.
# .streamlit/secrets.toml is in .gitignore — never commit it.

# ---------------------------------------------------------------------------
# Minimax AI (required for AI recommendations)
# Obtain at: https://www.minimaxi.com/
# ---------------------------------------------------------------------------
MINIMAX_API_KEY = "replace-me"
MINIMAX_BASE_URL = "https://api.minimax.chat/v1"

# ---------------------------------------------------------------------------
# Supabase (required for live database; app falls back to data/recipes.json
# if these are missing, so local dev works without them)
# Find these in: Supabase Dashboard → Project Settings → API
# ---------------------------------------------------------------------------
SUPABASE_URL = "https://your-project-ref.supabase.co"
SUPABASE_KEY = "your-anon-public-key-here"
